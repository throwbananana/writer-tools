name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-smoke-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install Linux audio prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-dev libasound2-dev

      - name: Install macOS audio prerequisites
        if: runner.os == 'macOS'
        run: |
          brew install portaudio

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff (new smoke test only)
        run: python -m ruff check tests/test_smoke_project_manager.py

      - name: Smoke tests
        run: python -m pytest -q tests/test_smoke_project_manager.py

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt
        continue-on-error: true
